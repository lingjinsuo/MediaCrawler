<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>评论推送管理 - MediaCrawler</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fa; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { font-size: 24px; color: #1a1a2e; }
    
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-card .platform { font-size: 14px; color: #666; margin-bottom: 8px; }
    .stat-card .numbers { display: flex; gap: 16px; }
    .stat-card .number { text-align: center; }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .stat-card .label { font-size: 12px; color: #999; }
    
    .filters { background: white; padding: 16px; border-radius: 12px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .filters select, .filters button { padding: 8px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .filters button { background: #4f46e5; color: white; border: none; }
    .filters button:hover { background: #4338ca; }
    
    .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f9fa; padding: 14px 12px; text-align: left; font-size: 13px; color: #666; font-weight: 500; }
    td { padding: 14px 12px; border-top: 1px solid #f0f0f0; font-size: 14px; vertical-align: top; }
    tr:hover { background: #f8f9fa; }
    
    .platform-tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .platform-tag.xhs { background: #fee2e2; color: #dc2626; }
    .platform-tag.dy { background: #dbeafe; color: #2563eb; }
    .platform-tag.ks { background: #dcfce7; color: #16a34a; }
    
    .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status-badge.pending { background: #fef3c7; color: #d97706; }
    .status-badge.processed { background: #d1fae5; color: #059669; }
    
    .comment-content { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .actions { display: flex; gap: 8px; }
    .btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; }
    .btn-process { background: #4f46e5; color: white; }
    .btn-view { background: #e0e7ff; color: #4338ca; }
    
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
    .pagination button { padding: 8px 16px; border: 1px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; }
    .pagination button.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .loading { text-align: center; padding: 40px; color: #999; }
    .empty { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📨 评论推送管理</h1>
      <div style="display: flex; gap: 12px;">
        <button onclick="runBatch()" id="syncBtn" style="background: #10b981; color: white;">🔄 同步</button>
        <button onclick="loadData()">🔃 刷新</button>
      </div>
    </div>
    
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="platform">加载中...</div>
        <div class="numbers">
          <div class="number"><div class="num">-</div><div class="label">总计</div></div>
          <div class="number"><div class="num">-</div><div class="label">待处理</div></div>
          <div class="number"><div class="num">-</div><div class="label">已处理</div></div>
        </div>
      </div>
    </div>
    
    <div class="filters">
      <select id="platformFilter" onchange="loadData()">
        <option value="">全部平台</option>
        <option value="xhs">小红书</option>
        <option value="dy">抖音</option>
        <option value="ks">快手</option>
      </select>
      <select id="statusFilter" onchange="loadData()">
        <option value="">全部状态</option>
        <option value="0">未处理</option>
        <option value="1">已阅读</option>
        <option value="2">添加私域中</option>
        <option value="3">已添加到私域</option>
        <option value="4">未成功添加私域</option>
        <option value="5">浅谈业务中</option>
        <option value="6">已成单</option>
        <option value="7">成单失败</option>
        <option value="8">其它</option>
        <option value="9">完结</option>
      </select>
      <input type="text" id="searchInput" placeholder="搜索评论内容..." onkeyup="if(event.key==='Enter') loadData()" style="padding: 8px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; width: 200px;">
      <button onclick="loadData()" style="background: #4f46e5; color: white;">🔍 搜索</button>
      <span id="totalCount" style="margin-left: auto; color: #666;">共 0 条</span>
    </div>
    
    <div class="table-container">
      <table>
        <thead>
           <tr>
              <th>ID</th>
              <th>平台</th>
              <th>作品信息</th>
              <th>评论内容</th>
              <th>评论时间</th>
              <th>评论者</th>
              <th>状态</th>
              <th>处理内容</th>
              <th>操作</th>
            </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    const API_BASE = '/api/comment-push';
    let currentPage = 1;
    let total = 0;
    
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/stats`);
        const data = await res.json();
        renderStats(data.stats || {});
      } catch (e) {
        console.error('加载统计失败:', e);
      }
    }
    
    function renderStats(stats) {
      const container = document.getElementById('stats');
      if (Object.keys(stats).length === 0) {
        container.innerHTML = `
          <div class="stat-card">
            <div class="platform">暂无数据</div>
            <div class="numbers">
              <div class="number"><div class="num">0</div><div class="label">总计</div></div>
              <div class="number"><div class="num">0</div><div class="label">待处理</div></div>
              <div class="number"><div class="num">0</div><div class="label">已处理</div></div>
            </div>
          </div>
        `;
        return;
      }
      
      container.innerHTML = Object.entries(stats).map(([key, s]) => `
        <div class="stat-card">
          <div class="platform">${s.platform_name}</div>
          <div class="numbers">
            <div class="number"><div class="num">${s.total}</div><div class="label">总计</div></div>
            <div class="number"><div class="num">${s.pending}</div><div class="label">待处理</div></div>
            <div class="number"><div class="num">${s.processed}</div><div class="label">已处理</div></div>
          </div>
        </div>
      `).join('');
    }
    
    // 状态映射
    const STATUS_MAP = {
      0: '未处理',
      1: '已阅读',
      2: '添加私域中',
      3: '已添加到私域',
      4: '未成功添加私域',
      5: '浅谈业务中',
      6: '已成单',
      7: '成单失败',
      8: '其它',
      9: '完结'
    };
    
    async function loadData() {
      const platform = document.getElementById('platformFilter').value;
      const status = document.getElementById('statusFilter').value;
      const search = document.getElementById('searchInput').value.trim();
      
      let url = `${API_BASE}/list?page=${currentPage}&page_size=20`;
      if (platform) url += `&platform=${platform}`;
      if (status) url += `&push_status=${status}`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        total = data.total || 0;
        renderTable(data.items || []);
        renderPagination();
        document.getElementById('totalCount').textContent = `共 ${total} 条`;
      } catch (e) {
        console.error('加载数据失败:', e);
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty">加载失败</td></tr>';
      }
    }
    
    function formatTime(timestamp) {
      if (!timestamp) return '-';
      const d = new Date(timestamp * 1000);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    
    function renderTable(items) {
      const tbody = document.getElementById('tableBody');
      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无数据</td></tr>';
        return;
      }
      
      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${item.id}</td>
          <td><span class="platform-tag ${item.platform}">${item.platform_name}</span></td>
          <td>
            <a href="${item.note_url || '#'}" target="_blank" title="${item.note_title || ''}" style="color: #4f46e5; text-decoration: none; max-width: 200px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
              ${item.note_title ? (item.note_title.length > 20 ? item.note_title.substring(0, 20) + '...' : item.note_title) : '-'}
            </a>
          </td>
          <td class="comment-content" title="${item.comment_content || ''}">${item.comment_content || '-'}</td>
          <td style="white-space: nowrap;">${formatTime(item.comment_time)}</td>
          <td>${item.comment_nickname || '-'}</td>
          <td>
            <select onchange="updateStatus(${item.id}, this.value)" style="padding: 4px 8px; border-radius: 4px; border: 1px solid #e0e0e0; font-size: 12px; cursor: pointer;">
              ${Object.entries(STATUS_MAP).map(([val, label]) => 
                `<option value="${val}" ${item.push_status === parseInt(val) ? 'selected' : ''}>${label}</option>`
              ).join('')}
            </select>
          </td>
          <td>
            <span contenteditable="true" 
                  style="min-width: 100px; display: block; outline: none; padding: 4px 8px; border-radius: 4px; border: 1px solid #e0e0e0; cursor: text;"
                  data-id="${item.id}"
                  data-original="${item.process_content || ''}"
                  onblur="saveProcessContent(this)">${item.process_content || ''}</span>
          </td>
          <td class="actions">
            <button class="btn btn-process" onclick="markProcessed(${item.id})">标记已完结</button>
          </td>
        </tr>
      `).join('');
    }
    
    function renderPagination() {
      const totalPages = Math.ceil(total / 20);
      const container = document.getElementById('pagination');
      
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }
      
      let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          html += `<span style="padding: 8px;">...</span>`;
        }
      }
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
      container.innerHTML = html;
    }
    
    function goPage(page) {
      currentPage = page;
      loadData();
    }
    
    async function markProcessed(id) {
      try {
        const res = await fetch(`${API_BASE}/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, push_status: 9 })
        });
        if (res.ok) {
          loadData();
          loadStats();
        } else {
          alert('操作失败: ' + (data.detail || '未知错误'));
        }
      } catch (e) {
        alert('操作失败: ' + e.message);
      }
    }
    
    async function runBatch() {
      const btn = document.getElementById('syncBtn');
      btn.disabled = true;
      btn.textContent = '同步中...';
      
      try {
        const platform = document.getElementById('platformFilter').value;
        let url = `${API_BASE}/run-batch`;
        if (platform) url += `?platform=${platform}`;
        
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        
        if (data.status === 'ok') {
          loadData();
          loadStats();
        }
      } catch (e) {
        console.error('同步失败:', e);
      } finally {
        btn.disabled = false;
        btn.textContent = '🔄 同步';
      }
    }
    
    async function saveProcessContent(el) {
      const id = parseInt(el.dataset.id);
      const newContent = el.innerText.trim();
      const originalContent = el.dataset.original || '';
      
      // 如果内容没变，不保存
      if (newContent === originalContent) return;
      
      try {
        const res = await fetch(`${API_BASE}/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, process_content: newContent, push_status: undefined })
        });
        
        if (res.ok) {
          el.dataset.original = newContent;
        }
      } catch (e) {
        console.error('保存失败:', e);
      }
    }
    
    async function updateStatus(id, status) {
      try {
        const res = await fetch(`${API_BASE}/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, push_status: parseInt(status), process_content: null })
        });
        
        if (res.ok) {
          loadStats();
        }
      } catch (e) {
        console.error('状态更新失败:', e);
      }
    }
    
    // 初始化
    loadStats();
    loadData();
  </script>
</body>
</html>
